version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    # Group related ecosystems into single PRs so Dependabot opens
    # roughly one PR per ecosystem per week instead of 5+ per day.
    groups:
      react-router:
        patterns:
          - "react-router"
          - "@react-router/*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
      stylelint:
        patterns:
          - "stylelint"
          - "stylelint-*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
          - "eslint-plugin-storybook"
      types:
        patterns:
          - "@types/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      cloudflare:
        patterns:
          - "wrangler"
          - "@cloudflare/*"
    # Deferred majors — Dependabot reopens the same PR every week
    # otherwise. Each entry has a specific reason; revisit when the
    # upstream unblocks.
    ignore:
      # ESLint 10 blocked by three plugins that still cap their eslint
      # peer at ^9 as of 2026-07-03:
      #   - eslint-plugin-import@2.32   (peer: ^2 || ... || ^9)
      #   - eslint-plugin-jsx-a11y@6.10  (peer: ^3 || ... || ^9)
      #   - eslint-plugin-react@7.37     (peer: ^3 || ... || ^9.7)
      # eslint-plugin-react-hooks@7.x and typescript-eslint@8.x already
      # widened to ^10, so this comes down to those three. Revisit when
      # any of them ships a release that accepts eslint@10.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
      # @cloudflare/workers-types v5 dropped the dated compatibility
      # subpaths (`/2023-07-01`, `/latest`, ...) — the only entrypoint
      # left is the main index. Our tsconfig.json still imports
      # `@cloudflare/workers-types/2023-07-01`. Also blocked by
      # wrangler@4's peer on `^4.x`; wrangler needs a matching release
      # before v5 can land. Revisit when wrangler ships v4-that-accepts-5
      # (or a new major with a widened peer).
      - dependency-name: "@cloudflare/workers-types"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
