name: Lighthouse

# Runs Lighthouse against production after a push to main lands. The
# sibling `deploy.yml` workflow builds + deploys the same commit; the
# 90s sleep below gives it time to finish (~60-90s wall-clock in
# practice: npm ci + build + wrangler upload) before we start scoring
# the new code. Loose coupling — Lighthouse doesn't `needs: deploy`
# because a deploy failure shouldn't hide a Lighthouse regression on
# the currently-serving bundle. If deploy hung, we'd notice via the
# deploy workflow failing surface, not by Lighthouse silently scoring
# stale code.
#
# Output: a small JSON per route at lighthouse/<route>-<sha>.json with
# the categories + key metrics + failing audits. The workflow commits
# those back to main using github-actions[bot]; the [skip ci] in the
# commit message keeps the loop from triggering itself.
#
# Failure mode: warn-only. The workflow always exits 0 if Lighthouse runs
# successfully, regardless of score deltas. If a regression sneaks in
# you'll see it in the next PR's diff against the previous snapshot. Move
# to a hard threshold once you see the signal hold steady for a few weeks.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't pile up runs if main gets multiple pushes in quick succession —
# the latest one wins.
concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Score prod
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Need write token for the commit-back step.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install if cache miss
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      # lighthouse + chrome-launcher are runtime-only (not deps because
      # the rest of the project doesn't need them). Cache the install
      # so we don't re-download ~40MB on every merge to main. Keyed by
      # the pinned major versions so bumping either invalidates.
      - name: Cache Lighthouse tools
        id: cache-lh
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/lighthouse-tools
          key: lighthouse-tools-lighthouse13-chrome1

      - name: Install Lighthouse runtime
        if: steps.cache-lh.outputs.cache-hit != 'true'
        run: |
          mkdir -p node_modules/.cache/lighthouse-tools
          cd node_modules/.cache/lighthouse-tools
          npm init -y > /dev/null
          npm install --no-audit --no-fund lighthouse@13 chrome-launcher@1

      - name: Symlink Lighthouse tools into node_modules
        run: |
          for pkg in lighthouse chrome-launcher; do
            src="node_modules/.cache/lighthouse-tools/node_modules/${pkg}"
            dest="node_modules/${pkg}"
            if [ -d "$src" ] && [ ! -e "$dest" ]; then
              ln -s "$(pwd)/${src}" "$dest"
            fi
          done

      - name: Wait for Cloudflare Workers deploy
        run: sleep 90

      - name: Run Lighthouse
        # Custom inline script instead of treosh/lighthouse-ci-action because
        # we want full control over the per-route output shape (matching the
        # hand-authored summaries in lighthouse/) and don't need an LHCI
        # server or the assertion-config plumbing.
        run: node scripts/run-lighthouse.mjs
        env:
          LIGHTHOUSE_SHA: ${{ github.sha }}

      - name: Prune old SHA-tagged summaries
        # Keep only the 25 most recent commits' worth of SHA-tagged
        # summaries (5 routes × 25 commits = 125 files). Hand-authored
        # stage summaries (`*-pre-stage-*.summary.json`,
        # `*-post-stage-*.summary.json`) are NEVER pruned.
        run: |
          cd lighthouse
          # Find SHA-tagged files: anything matching `*-<7-hex-chars>.summary.json`.
          ls -1t -- *-[0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f].summary.json 2>/dev/null | tail -n +126 | xargs -r rm --

      - name: Commit summaries
        # HUSKY=0 disables the pre-push hook for the workflow's `git push`.
        # The hook would otherwise re-run lint/typecheck/unit on each
        # auto-commit — wasted work since the merged commit already passed
        # CI, and prettier picks up generated lighthouse-reports/ files in
        # the working tree which trips the hook.
        env:
          HUSKY: '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet lighthouse/ && [ -z "$(git status --porcelain lighthouse/)" ]; then
            echo "No lighthouse summary changes to commit."
            exit 0
          fi
          git add lighthouse/
          git commit -m "chore(lighthouse): score for ${GITHUB_SHA::7} [skip ci]"
          git push

      - name: Upload full reports as artifact
        # The full Lighthouse JSON (~1.5MB per route) isn't committed
        # because it bloats the repo — but it's useful for debugging when
        # a score moves unexpectedly. Retained for 14 days.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: lighthouse-reports/
          retention-days: 14
