name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

  unit-tests:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npm test

  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    # Run inside the same Playwright image used by scripts/update-visual-baselines.sh
    # so visual-regression baselines (committed as *-chromium-linux.png) compare
    # against pixel-identical fontconfig/freetype as the regen environment.
    # ubuntu-latest's host filesystem (Ubuntu 24.04) ships subtly different
    # font rendering vs the jammy (22.04) image baselines were captured in;
    # without this container, the visual specs flake on ~0.3% pixel diffs.
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
      options: --ipc=host
    steps:
      - uses: actions/checkout@v6

      # The Playwright image's bundled Node version drifts (currently 24).
      # Pin to .nvmrc so this job uses the same Node as the other jobs and
      # as the local dev environment. Without this, esbuild's postinstall
      # races on parallel npm extraction (ETXTBSY) under newer Node.
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - run: npm ci

      # Run both projects so the mobile (Pixel 7) visual baselines
      # are also gated on CI. Behavioural specs run on both projects
      # too — duplicates the chromium pass on mobile viewports, which
      # catches layout regressions that only show up below $bp-md.
      - run: npm run test:e2e -- --project=chromium --project=mobile

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  storybook-build:
    name: Storybook build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npm run build-storybook
